name: Release

on:
  push:
    tags:
      - "v*.*.*"
    # Excludes beta tags (those are handled by beta-release.yml)
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev libspeechd-dev libclang-dev
      - name: Install Windows build deps
        if: runner.os == 'Windows'
        run: |
          choco install strawberryperl nasm -y
          echo "C:\Strawberry\perl\bin" >> $env:GITHUB_PATH
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH
      - run: cargo build --release
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp target/release/vellum-fe-tabbed dist/
          strip dist/vellum-fe-tabbed
          tar -czf dist/vellum-fe-tabbed-linux-x86_64.tar.gz -C dist vellum-fe-tabbed
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/release/vellum-fe-tabbed.exe dist/
          Compress-Archive -Path dist/vellum-fe-tabbed.exe -DestinationPath dist/vellum-fe-tabbed-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-release
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: VellumFE-Tabbed ${{ inputs.tag || github.ref_name }}
          body: |
            ## VellumFE-Tabbed ${{ inputs.tag || github.ref_name }}

            See [PROGRESS.md](https://github.com/Buckwheet/VellumFE-Tabbed/blob/main/PROGRESS.md) for what's in this release.
          files: dist/*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}